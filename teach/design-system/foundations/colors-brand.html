<!-- @dsCard group="Colors" viewport="700x190" name="Brand Purple Ramp" subtitle="The cosmic violet ramp — gradients, links, accents" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); padding: 24px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { flex: 1; min-width: 96px; }
  .chip { height: 72px; border-radius: var(--radius-md); border: 1px solid var(--card-border); }
  .name { color: var(--text); font-size: 13px; font-weight: 600; margin-top: 8px; }
  .hex { color: var(--muted); font-size: 11px; font-family: var(--font-mono); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--accent-light)"></div><div class="name">accent-light</div><div class="hex">#C084FC</div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-1)"></div><div class="name">accent-1</div><div class="hex">#A855F7</div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-2)"></div><div class="name">accent-2</div><div class="hex">#7C3AED</div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-deep)"></div><div class="name">accent-deep</div><div class="hex">#6D28D9</div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-deepest)"></div><div class="name">accent-deepest</div><div class="hex">#4C1D95</div></div>
    <div class="sw"><div class="chip" style="background:var(--gradient-brand)"></div><div class="name">gradient-brand</div><div class="hex">135°</div></div>
  </div>
</body>
</html>
