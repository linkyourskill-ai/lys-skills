<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); padding: 28px; }
  .stack { display: flex; flex-direction: column; gap: 18px; }
  .item { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--card-border); padding-bottom: 14px; }
  .meta { color: var(--muted); font-size: 11px; font-family: var(--font-mono); width: 130px; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="stack">
    <div class="item"><span class="meta">hero · 800 · -.03em</span><h1 style="font-size:40px">When AI needs the <span class="gradient-text">real world</span></h1></div>
    <div class="item"><span class="meta">h2 · 700 · -.02em</span><h2>Security &amp; Trust</h2></div>
    <div class="item"><span class="meta">h3 · 700 · 20px</span><h3>For Skill Providers</h3></div>
  </div>
</body>
</html>
