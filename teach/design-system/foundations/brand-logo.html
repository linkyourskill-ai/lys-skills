<!-- @dsCard group="Brand" viewport="700x200" name="Logo & Wordmark" subtitle="Glossy violet mark paired with the gradient-text wordmark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-deep); padding: 32px; }
  .row { display: flex; align-items: center; gap: 40px; flex-wrap: wrap; }
  .lockup { display: flex; align-items: center; gap: 12px; }
  .lockup img { width: 44px; height: 44px; }
  .wordmark { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
  .mark-only img { width: 64px; height: 64px; }
  .sep { width: 1px; height: 64px; background: var(--card-border); }
</style>
</head>
<body>
  <div class="row">
    <div class="mark-only"><img src="../assets/logo-linkyourskill.png" alt="LinkYourSkill mark"></div>
    <div class="sep"></div>
    <div class="lockup">
      <img src="../assets/logo-linkyourskill.png" alt="LinkYourSkill">
      <span class="wordmark gradient-text">LinkYourSkill</span>
    </div>
  </div>
</body>
</html>
