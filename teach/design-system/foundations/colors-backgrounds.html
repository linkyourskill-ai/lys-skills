<!-- @dsCard group="Colors" viewport="700x170" name="Backgrounds & Text" subtitle="Dark cosmic surfaces and the type colors that sit on them" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); padding: 24px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { flex: 1; min-width: 96px; }
  .chip { height: 64px; border-radius: var(--radius-md); border: 1px solid var(--card-border); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
  .name { color: var(--text); font-size: 13px; font-weight: 600; margin-top: 8px; }
  .hex { color: var(--muted); font-size: 11px; font-family: var(--font-mono); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--bg)"></div><div class="name">bg</div><div class="hex">#0A0A18</div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-deep)"></div><div class="name">bg-deep</div><div class="hex">#06060F</div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-deep);color:var(--text)">Aa</div><div class="name">text</div><div class="hex">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-deep);color:var(--muted)">Aa</div><div class="name">muted</div><div class="hex">#B4BCC8</div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-deep)"><span class="gradient-text" style="font-weight:800">Aa</span></div><div class="name">gradient-text</div><div class="hex">highlight</div></div>
  </div>
</body>
</html>
