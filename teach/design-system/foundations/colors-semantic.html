<!-- @dsCard group="Colors" viewport="700x170" name="Semantic Status" subtitle="Success, warning, danger — plus the green check pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); padding: 24px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-start; }
  .sw { flex: 1; min-width: 96px; }
  .chip { height: 56px; border-radius: var(--radius-md); display:flex; align-items:center; justify-content:center; }
  .name { color: var(--text); font-size: 13px; font-weight: 600; margin-top: 8px; }
  .hex { color: var(--muted); font-size: 11px; font-family: var(--font-mono); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--success)"></div><div class="name">success</div><div class="hex">#22C55E</div></div>
    <div class="sw"><div class="chip" style="background:var(--success-deep)"></div><div class="name">success-deep</div><div class="hex">#16A34A</div></div>
    <div class="sw"><div class="chip" style="background:var(--warning)"></div><div class="name">warning</div><div class="hex">#F59E0B</div></div>
    <div class="sw"><div class="chip" style="background:var(--danger)"></div><div class="name">danger</div><div class="hex">#EF4444</div></div>
    <div class="sw"><div class="chip" style="background:var(--card-bg);border:1px solid var(--card-border)"><span class="check-badge">✓</span></div><div class="name">check-badge</div><div class="hex">.check-badge</div></div>
  </div>
</body>
</html>
