<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="4px-based rhythm — space-1 through space-16" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg); padding: 28px; }
  .row { display: flex; align-items: flex-end; gap: 20px; flex-wrap: wrap; }
  .item { text-align: center; }
  .bar { background: var(--gradient-brand); border-radius: 4px; width: 100%; }
  .name { color: var(--text); font-size: 12px; font-weight: 600; margin-top: 8px; }
  .val { color: var(--muted); font-size: 11px; font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px;width:4px"></div><div class="name">1</div><div class="val">4</div></div>
    <div class="item"><div class="bar" style="height:8px;width:8px"></div><div class="name">2</div><div class="val">8</div></div>
    <div class="item"><div class="bar" style="height:12px;width:12px"></div><div class="name">3</div><div class="val">12</div></div>
    <div class="item"><div class="bar" style="height:16px;width:16px"></div><div class="name">4</div><div class="val">16</div></div>
    <div class="item"><div class="bar" style="height:24px;width:24px"></div><div class="name">6</div><div class="val">24</div></div>
    <div class="item"><div class="bar" style="height:32px;width:32px"></div><div class="name">8</div><div class="val">32</div></div>
    <div class="item"><div class="bar" style="height:48px;width:48px"></div><div class="name">12</div><div class="val">48</div></div>
    <div class="item"><div class="bar" style="height:64px;width:64px"></div><div class="name">16</div><div class="val">64</div></div>
  </div>
</body>
</html>
