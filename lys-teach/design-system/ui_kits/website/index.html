<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LinkYourSkill — When AI needs the real world</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg-deep); position: relative; overflow-x: hidden; }
  /* fixed cosmic glow backdrop */
  .lys-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  @media (max-width: 1023px) {
    .lys-intro-grid { grid-template-columns: 1fr 1fr !important; }
    .lys-trust-grid { grid-template-columns: 1fr 1fr !important; }
  }
  @media (max-width: 767px) {
    .lys-nav-inline { display: none !important; }
    .lys-intro-grid, .lys-trust-grid { grid-template-columns: 1fr !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div class="lys-bg">
  <div class="cosmic-glow cosmic-glow-1"></div>
  <div class="cosmic-glow cosmic-glow-2"></div>
</div>
<div id="root" style="position:relative;z-index:1"></div>

<script type="text/babel" src="SiteHeader.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Showcase.jsx"></script>
<script type="text/babel" src="IntroCards.jsx"></script>
<script type="text/babel" src="Trust.jsx"></script>
<script type="text/babel" src="CtaFooter.jsx"></script>
<script type="text/babel">
  const { useState } = React;
  function Site() {
    const [active, setActive] = useState("home");
    return (
      <>
        <window.SiteHeader active={active} onNav={setActive} />
        <window.Hero />
        <window.Showcase />
        <window.IntroCards />
        <window.Trust />
        <window.CtaSection />
        <window.SiteFooter />
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Site />);
</script>
</body>
</html>
