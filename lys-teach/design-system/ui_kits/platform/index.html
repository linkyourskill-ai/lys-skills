<!-- @startingPoint section="Platform" subtitle="Agent-owner dashboard app shell" viewport="1280x860" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LinkYourSkill — Platform</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg-deep); position: relative; overflow-x: hidden; }
  .lys-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .lys-content { position: relative; z-index: 1; max-width: var(--section-max); margin: 0 auto; padding: 32px var(--section-pad-x) 64px; }
  @media (max-width: 900px) {
    .lys-stats-grid { grid-template-columns: 1fr 1fr !important; }
  }
  @media (max-width: 640px) {
    .lys-stats-grid, .lys-two-grid { grid-template-columns: 1fr !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div class="lys-bg">
  <div class="cosmic-glow cosmic-glow-1"></div>
  <div class="cosmic-glow cosmic-glow-2"></div>
</div>
<div id="root"></div>

<script type="text/babel" src="PlatformNav.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel">
  const { useState } = React;
  const NAV = [
    { id: "dashboard", label: "Dashboard" },
    { id: "agents", label: "Agents" },
    { id: "orders", label: "Orders" },
    { id: "invoices", label: "Invoices" },
    { id: "playground", label: "API Playground" },
    { id: "settings", label: "Settings" },
  ];
  function App() {
    const [active, setActive] = useState("dashboard");
    const { Dashboard, Agents, Orders } = window.PlatformScreens;
    const Screen = active === "agents" ? Agents : active === "orders" ? Orders : Dashboard;
    return (
      <>
        <window.PlatformNav items={NAV} active={active} onNav={setActive} />
        <div className="lys-content"><Screen /></div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
